[pytest]
filterwarnings =
    # Known upstream dependency deprecation (starlette, via fastapi.testclient):
    # starlette.testclient warns when httpx (rather than the newer httpx2
    # package) is installed. We use fastapi's TestClient (which re-exports
    # starlette's) throughout tests/conftest.py; this is starlette's own
    # migration notice, not anything under our control.
    ignore:Using `httpx` with `starlette\.testclient` is deprecated; install `httpx2` instead\.:starlette.exceptions.StarletteDeprecationWarning:fastapi\.testclient
    # Known upstream dependency deprecation (slowapi): slowapi/extension.py
    # still calls the stdlib `asyncio.iscoroutinefunction`, deprecated in
    # favor of `inspect.iscoroutinefunction()`. Fix lives upstream in slowapi,
    # not in our code.
    ignore:'asyncio\.iscoroutinefunction' is deprecated and slated for removal in Python 3\.\d+; use inspect\.iscoroutinefunction\(\) instead:DeprecationWarning:slowapi\.extension
