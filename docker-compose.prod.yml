# Production overrides — merge with base:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# This file targets the canonical production environment:
#   API:  https://api.oviddb.org  (reverse-proxied via redshirt, host port 8100)
#   Web:  https://oviddb.org      (reverse-proxied via redshirt, host port 3100)
#   DB:   PostgreSQL on internal port 5432 (not exposed externally)
#
# See docs/deployment.md for full deployment instructions.

name: ovid-prod

x-prod-note: >
  This file is a Docker Compose override. It is NOT standalone.
  Always run with both files:
    docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
  Use the 'docker compose' plugin (v2), not the legacy hyphenated 'docker-compose' binary.

services:

  db:
    container_name: ovid-prod-db
    # Don't expose PostgreSQL externally in production
    ports: !reset []

  # Shared rate-limit store for the multi-worker (gunicorn -w 4) api service.
  # Internal-only (NO published host port, mirroring the prod db), ephemeral —
  # counters are short-window and disposable, so no persistence (no volume,
  # no AOF/RDB). Backs slowapi's RedisStorage (INFRA-01).
  redis:
    image: redis:7-alpine
    container_name: ovid-prod-redis
    restart: unless-stopped
    # Ephemeral: disable RDB snapshots (--save "") and AOF (--appendonly no).
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    container_name: ovid-prod-api
    # No source mount in production — use the baked-in image
    volumes: !reset []
    # Wait for redis (shared rate-limit store) as well as db.
    depends_on:
      redis:
        condition: service_healthy
    # Expose on 8100 to avoid conflict with dev stack on 8000
    ports: !override
      - "8100:8000"
    command: >-
      gunicorn -w "${OVID_WORKERS:-4}" -k uvicorn.workers.UvicornWorker
      main:app --bind 0.0.0.0:8000
      --forwarded-allow-ips "${OVID_FORWARDED_ALLOW_IPS:-127.0.0.1}"
    environment:
      DATABASE_URL:          postgresql://${OVID_DB_USER:-ovid}:${OVID_DB_PASSWORD:-ovidlocal}@db:5432/${OVID_DB_NAME:-ovid}
      # Shared cross-worker rate-limit counters. OVID_WORKERS is the single
      # source of truth for both `-w` above and this env var (WR-02) — both
      # are interpolated from the same OVID_WORKERS value so they can't
      # drift apart; with >1 workers and no REDIS_URL the api refuses to
      # boot (D-06).
      REDIS_URL:             redis://redis:6379/0
      OVID_WORKERS:          "${OVID_WORKERS:-4}"
      SECRET_KEY:            ${OVID_SECRET_KEY}
      OVID_MODE:             canonical
      OVID_ENV:              production
      LOG_LEVEL:             ${LOG_LEVEL:-info}
      CORS_ORIGINS:          ${CORS_ORIGINS:-https://oviddb.org}
      OVID_API_URL:          https://api.oviddb.org
      GITHUB_CLIENT_ID:      ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET:  ${GITHUB_CLIENT_SECRET}
      GOOGLE_CLIENT_ID:      ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET:  ${GOOGLE_CLIENT_SECRET}
      APPLE_CLIENT_ID:       ${APPLE_CLIENT_ID}
      APPLE_TEAM_ID:         ${APPLE_TEAM_ID}
      APPLE_KEY_ID:          ${APPLE_KEY_ID}
      APPLE_PRIVATE_KEY:     ${APPLE_PRIVATE_KEY}

  web:
    container_name: ovid-prod-web
    build:
      context: ./web
      args:
        NEXT_PUBLIC_API_URL: 'https://api.oviddb.org'
    # Expose on 3100 to avoid conflict with dev stack on 3000
    ports: !override
      - "3100:3000"
    environment:
      NEXT_PUBLIC_API_URL: https://api.oviddb.org
      API_URL: http://api:8000
