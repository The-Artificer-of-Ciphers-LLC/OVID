name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  # ── Run tests before building anything ──────────────────────────────
  test:
    name: Test suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install all dependencies
        run: |
          pip install -r api/requirements.txt
          pip install pytest httpx
          cd ovid-client && pip install -e '.[dev]' && cd ..

      - name: ovid-client tests
        run: cd ovid-client && python -m pytest tests/ -v --tb=short

      - name: API tests
        run: cd api && python -m pytest tests/ -v --tb=short

      - name: E2E tests
        run: PYTHONPATH=api python -m pytest tests/ -v --tb=short

  # ── Build Docker image for the API server ───────────────────────────
  docker:
    name: Docker image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Compute image name (lowercase)
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/ovid-api" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push API image
        uses: docker/build-push-action@v7
        with:
          context: ./api
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.image.outputs.name }}:${{ steps.version.outputs.version }}
            ${{ steps.image.outputs.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Build ovid-client CLI binaries ──────────────────────────────────
  cli-binaries:
    name: CLI binary (${{ matrix.os }}-${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: test
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            runner: ubuntu-latest
            artifact: ovid-linux-amd64
          - os: linux
            arch: arm64
            runner: ubuntu-24.04-arm
            artifact: ovid-linux-arm64
          - os: macos
            arch: arm64
            runner: macos-latest
            artifact: ovid-macos-arm64
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ovid-client and PyInstaller
        run: |
          cd ovid-client
          pip install -e .
          pip install pyinstaller

      - name: Build binary
        run: |
          cd ovid-client
          pyinstaller \
            --onefile \
            --name ${{ matrix.artifact }} \
            --hidden-import ovid \
            --hidden-import ovid.cli \
            --hidden-import ovid.disc \
            --hidden-import ovid.fingerprint \
            --hidden-import ovid.ifo_parser \
            --hidden-import ovid.readers \
            --hidden-import ovid.readers.folder \
            --hidden-import ovid.readers.iso \
            --hidden-import ovid.readers.drive \
            --hidden-import ovid.client \
            --hidden-import ovid.tmdb \
            src/ovid/cli.py

      - name: Smoke test binary
        run: |
          ./ovid-client/dist/${{ matrix.artifact }} fingerprint --help

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: ovid-client/dist/${{ matrix.artifact }}

  # ── Create GitHub Release ───────────────────────────────────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [docker, cli-binaries]
    steps:
      - uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download all CLI artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: ovid-*
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          cp artifacts/ovid-linux-amd64/ovid-linux-amd64 release-assets/
          cp artifacts/ovid-linux-arm64/ovid-linux-arm64 release-assets/
          cp artifacts/ovid-macos-arm64/ovid-macos-arm64 release-assets/
          chmod +x release-assets/*
          cd release-assets
          sha256sum * > SHA256SUMS.txt || shasum -a 256 * > SHA256SUMS.txt

      - name: Extract changelog for this version
        id: changelog
        run: |
          # Extract the section for this version from CHANGELOG.md
          awk '/^## \['"${{ steps.version.outputs.version }}"'\]/{found=1; next} /^## \[/{if(found) exit} found' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "Release ${{ steps.version.outputs.version }}" > release-notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.version }} — Foundation & Core Pipeline"
          body_path: release-notes.md
          files: |
            release-assets/ovid-linux-amd64
            release-assets/ovid-linux-arm64
            release-assets/ovid-macos-arm64
            release-assets/SHA256SUMS.txt
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
