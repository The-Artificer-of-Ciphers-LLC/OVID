name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  ovid-client-tests:
    name: ovid-client tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Windows is intentionally out of scope here per FPRINT-05 (which
        # requires byte-identical determinism across Linux/macOS drives and
        # OSes only) — not a coverage gap to be closed by adding
        # windows-latest, but a deliberate boundary of the fingerprinting
        # spec's cross-OS guarantee.
        os: [ubuntu-latest, macos-latest]
    defaults:
      run:
        working-directory: ovid-client
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e '.[dev]'

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  api-tests:
    name: API tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  e2e-tests:
    name: E2E pipeline tests
    runs-on: ubuntu-latest
    needs: [ovid-client-tests, api-tests]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r api/requirements.txt
          pip install pytest httpx
          cd ovid-client && pip install -e '.[dev]' && cd ..

      - name: Run E2E tests
        run: PYTHONPATH=api python -m pytest tests/ -v --tb=short

  web-tests:
    name: Web UI tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: cd web && npm ci

      - name: Run tests
        run: cd web && npx vitest run

  docs-build:
    name: Documentation build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install MkDocs Material
        run: pip install -r docs/requirements.txt

      - name: Build documentation (strict)
        run: mkdocs build --strict
