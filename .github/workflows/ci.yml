name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  ovid-client-tests:
    name: ovid-client tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ovid-client
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e '.[dev]'

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  api-tests:
    name: API tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  e2e-tests:
    name: E2E pipeline tests
    runs-on: ubuntu-latest
    needs: [ovid-client-tests, api-tests]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r api/requirements.txt
          pip install pytest httpx
          cd ovid-client && pip install -e '.[dev]' && cd ..

      - name: Run E2E tests
        run: PYTHONPATH=api python -m pytest tests/ -v --tb=short
