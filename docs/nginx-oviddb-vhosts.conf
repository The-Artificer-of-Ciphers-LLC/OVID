# nginx vhost configuration for oviddb.org and api.oviddb.org
#
# These server blocks are added to redshirt's nginx.conf
# (/root/compose/nginx/nginx.conf) to route traffic to the OVID
# production stack on holodeck.
#
# Port-80 blocks serve ACME challenges for Let's Encrypt cert issuance
# and redirect all other traffic to HTTPS.
#
# Port-443 blocks terminate TLS with Let's Encrypt certs (SAN cert
# covering both oviddb.org and api.oviddb.org) and proxy to holodeck.
#
# Cert path: /etc/letsencrypt/live/oviddb.org/ (SAN cert)
# Holodeck LAN IP: 192.168.0.28
#   - Web UI: port 3100 (oviddb.org)
#   - API:    port 8100 (api.oviddb.org)
#
# Deployed by: M005/S01 (redshirt nginx vhosts + TLS certs)
# Last updated: 2026-04-03

# --- oviddb.org — web UI ---

server {
    listen 80;
    server_name oviddb.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name oviddb.org;

    ssl_certificate     /etc/letsencrypt/live/oviddb.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/oviddb.org/privkey.pem;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location / {
        proxy_pass http://192.168.0.28:3100;
    }
}

# --- api.oviddb.org — API ---

server {
    listen 80;
    server_name api.oviddb.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name api.oviddb.org;

    ssl_certificate     /etc/letsencrypt/live/oviddb.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/oviddb.org/privkey.pem;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location / {
        proxy_pass http://192.168.0.28:8100;
    }
}
