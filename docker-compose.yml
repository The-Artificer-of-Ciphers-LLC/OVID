services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${OVID_DB_NAME:-ovid}
      POSTGRES_USER:     ${OVID_DB_USER:-ovid}
      POSTGRES_PASSWORD: ${OVID_DB_PASSWORD:-ovidlocal}
    volumes:
      - ovid_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${OVID_DB_USER:-ovid}"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  valkey:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    volumes:
      - ovid_valkey:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "6379:6379"

  api:
    build: ./api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_healthy
    environment:
      DATABASE_URL:        postgresql://${OVID_DB_USER:-ovid}:${OVID_DB_PASSWORD:-ovidlocal}@db:5432/${OVID_DB_NAME:-ovid}
      OVID_SECRET_KEY:     ${OVID_SECRET_KEY:-dev-secret-change-in-production}
      OVID_MODE:           ${OVID_MODE:-standalone}
      LOG_LEVEL:           ${LOG_LEVEL:-info}
      REDIS_URL:           ${REDIS_URL:-redis://valkey:6379/0}
      SESSION_SECRET_KEY:  ${SESSION_SECRET_KEY:-dev-session-secret-change-in-production}
      ALLOWED_ORIGINS:     ${ALLOWED_ORIGINS:-http://localhost:3000}
      COOKIE_DOMAIN:       ${COOKIE_DOMAIN:-}
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  sync:
    build: ./api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - mirror
    environment:
      DATABASE_URL: postgresql://${OVID_DB_USER:-ovid}:${OVID_DB_PASSWORD:-ovidlocal}@db:5432/${OVID_DB_NAME:-ovid}
      SYNC_SOURCE_URL: ${SYNC_SOURCE_URL:-https://api.oviddb.org}
      SYNC_INTERVAL_MINUTES: ${SYNC_INTERVAL_MINUTES:-60}
    command: python scripts/sync.py --daemon
    volumes:
      - ./api:/app

  web:
    build: ./web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      API_URL: http://api:8000
    ports:
      - "3000:3000"

volumes:
  ovid_pgdata:
  ovid_valkey:
